apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubechecks.fullname" . }}
rules:
  - apiGroups: ['argoproj.io']
    resources: ['applications', 'appprojects', 'applicationsets', 'services']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['']
    resources: ['secrets']
    verbs: ['get', 'list', 'watch']
  {{- if .Values.configMap.env.KUBECHECKS_ENABLE_AI_REVIEW }}
  # AI review - read-only access to workload resources
  - apiGroups: ['']
    resources: ['namespaces', 'services', 'configmaps', 'pods', 'persistentvolumeclaims']
    verbs: ['get', 'list']
  - apiGroups: ['apps']
    resources: ['deployments', 'statefulsets', 'daemonsets', 'replicasets']
    verbs: ['get', 'list']
  - apiGroups: ['autoscaling']
    resources: ['horizontalpodautoscalers']
    verbs: ['get', 'list']
  - apiGroups: ['batch']
    resources: ['jobs', 'cronjobs']
    verbs: ['get', 'list']
  - apiGroups: ['networking.k8s.io']
    resources: ['ingresses', 'networkpolicies']
    verbs: ['get', 'list']
  - apiGroups: ['policy']
    resources: ['poddisruptionbudgets']
    verbs: ['get', 'list']
  - apiGroups: ['keda.sh']
    resources: ['scaledobjects', 'triggerauthentications']
    verbs: ['get', 'list']
  - apiGroups: ['gateway.networking.k8s.io']
    resources: ['gateways', 'httproutes', 'grpcroutes', 'tcproutes', 'tlsroutes', 'referencegrants']
    verbs: ['get', 'list']
  {{- end }}
